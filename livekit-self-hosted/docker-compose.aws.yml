# LiveKit Self-Hosted Stack for AWS EC2
# All services use host networking for SIP/RTP compatibility

services:
  redis:
    image: redis:7-alpine
    container_name: livekit-redis
    network_mode: host
    command: redis-server --bind 0.0.0.0
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: livekit-postgres
    environment:
      POSTGRES_USER: oktivo
      POSTGRES_PASSWORD: oktivo123
      POSTGRES_DB: oktivo_calls
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@oktivo.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - postgres
    restart: unless-stopped

  livekit-server:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    network_mode: host
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        keys:
          APIAwsKey: uTNVhNxW8Rc99b2FHYLz30uO15EP9cZI7U9IbjN1Y6g=
        redis:
          address: localhost:6379
        rtc:
          port_range_start: 50000
          port_range_end: 60000
          tcp_port: 7881
          use_external_ip: true
        logging:
          level: info
    depends_on:
      - redis
    restart: unless-stopped

  livekit-sip:
    image: livekit/sip:latest
    container_name: livekit-sip
    network_mode: host
    environment:
      SIP_CONFIG_BODY: |
        api_key: APIAwsKey
        api_secret: uTNVhNxW8Rc99b2FHYLz30uO15EP9cZI7U9IbjN1Y6g=
        ws_url: ws://localhost:7880
        redis:
          address: localhost:6379
        sip_port: 5060
        rtp_port: 10000-20000
        use_external_ip: true
        logging:
          level: info
    depends_on:
      - livekit-server
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: livekit-agent
    network_mode: host
    environment:
      LIVEKIT_URL: ws://localhost:7880
      LIVEKIT_API_KEY: APIAwsKey
      LIVEKIT_API_SECRET: uTNVhNxW8Rc99b2FHYLz30uO15EP9cZI7U9IbjN1Y6g=
      SIP_OUTBOUND_TRUNK_ID: ST_ahVkUpcc2u5U
      LIVEKIT_AGENT_NAME: outbound-agent
      DATABASE_URL: postgresql://oktivo:oktivo123@localhost:5432/oktivo_calls
    depends_on:
      - livekit-server
      - postgres
    restart: unless-stopped

  make-call:
    build:
      context: ./agent
      dockerfile: Dockerfile
    network_mode: host
    environment:
      LIVEKIT_URL: http://localhost:7880
      LIVEKIT_API_KEY: APIAwsKey
      LIVEKIT_API_SECRET: uTNVhNxW8Rc99b2FHYLz30uO15EP9cZI7U9IbjN1Y6g=
      SIP_OUTBOUND_TRUNK_ID: ST_ahVkUpcc2u5U
      LIVEKIT_AGENT_NAME: outbound-agent
      DATABASE_URL: postgresql://oktivo:oktivo123@localhost:5432/oktivo_calls
    profiles: [tools]
    entrypoint: ["python", "make_call.py"]

volumes:
  postgres_data:

# RedisInsight runs separately with host network:
# docker run -d --name redis-insight --network host redis/redisinsight:latest
