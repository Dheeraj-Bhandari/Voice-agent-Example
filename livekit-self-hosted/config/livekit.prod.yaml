# LiveKit Server Production Configuration
# Update domain and keys before deploying

port: 7880

# API keys - GENERATE NEW KEYS FOR PRODUCTION
# Generate with: openssl rand -base64 32
keys:
  # api_key: api_secret
  APIProdKey: YOUR_PRODUCTION_SECRET_HERE

redis:
  address: redis:6379

rtc:
  port_range_start: 50000
  port_range_end: 60000
  tcp_port: 7881
  use_external_ip: true

# TURN server for better connectivity
turn:
  enabled: true
  domain: turn.yourdomain.com
  tls_port: 5349
  udp_port: 3478
  # cert_file: /path/to/cert.pem
  # key_file: /path/to/key.pem

logging:
  level: info
  json: true

room:
  auto_create: true
  empty_timeout: 300
